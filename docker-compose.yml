services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: chrms_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthpass123}
      POSTGRES_DB: ${POSTGRES_DB:-healthdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthadmin} -d ${POSTGRES_DB:-healthdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chrms_network

  # ── Redis (cache + Celery broker) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chrms_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - chrms_network

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chrms_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthadmin}:${POSTGRES_PASSWORD:-healthpass123}@db:5432/${POSTGRES_DB:-healthdb}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
      DEBUG: ${DEBUG:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@chrms.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123!}
      COPI_EMAIL: ${COPI_EMAIL:-copi@chrms.local}
      COPI_PASSWORD: ${COPI_PASSWORD:-CoPi@123!}
      COLLECTOR_EMAIL: ${COLLECTOR_EMAIL:-collector@chrms.local}
      COLLECTOR_PASSWORD: ${COLLECTOR_PASSWORD:-Collector@123!}
      ML_EMAIL: ${ML_EMAIL:-ml@chrms.local}
      ML_PASSWORD: ${ML_PASSWORD:-MlEng@123!}
      DEMO_EMAIL: ${DEMO_EMAIL:-demo@chrms.local}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-Demo@123!}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chrms_network
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chrms_worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthadmin}:${POSTGRES_PASSWORD:-healthpass123}@db:5432/${POSTGRES_DB:-healthdb}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chrms_network
    restart: unless-stopped

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chrms_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - chrms_network
    restart: unless-stopped

  # ── Nginx Reverse Proxy (production profile) ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: chrms_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - chrms_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  chrms_network:
    driver: bridge
