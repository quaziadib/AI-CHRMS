services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: health_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthpass123}
      POSTGRES_DB: ${POSTGRES_DB:-healthdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthadmin} -d ${POSTGRES_DB:-healthdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - health_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthadmin}:${POSTGRES_PASSWORD:-healthpass123}@db:5432/${POSTGRES_DB:-healthdb}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - health_network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: health_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - health_network
    restart: unless-stopped

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: health_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - health_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:

networks:
  health_network:
    driver: bridge
